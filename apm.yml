name: bingo-machine
version: 1.6.5
description: AI agent instructions for the Bingo Machine project
author: ROhta
license: GPL-3.0-or-later
type: instructions
targets:
- claude
- codex
- copilot
includes: auto
dependencies:
  mcp:
  - name: semgrep
    registry: false
    transport: stdio
    command: uvx
    args:
    - semgrep-mcp
  - name: chrome-devtools
    registry: false
    transport: stdio
    command: npx
    args:
    - chrome-devtools-mcp@latest
  - name: serena
    registry: false
    transport: stdio
    command: uvx
    args:
    - --from
    - git+https://github.com/oraios/serena
    - serena
    - start-mcp-server
  - name: context7
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@upstash/context7-mcp'
  apm:
  - anthropics/claude-code/plugins/code-review#39e853e4074d90f27afdfb7ea601e0fc378bd0c5
  - obra/superpowers#f2cbfbefebbfef77321e4c9abc9e949826bea9d7
