name: APM Drift Check
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - '.apm/**'
      - '.github/instructions/**'
      - apm.yml
jobs:
  Drift-Check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@v1
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - uses: actions/checkout@v6
      - name: Install APM packages
        uses: microsoft/apm-action@v1
      - name: Check drift in .github/instructions/
        run: |
          if [ -n "$(git status --porcelain -- .github/instructions/)" ]; then
            echo "::error::.github/instructions/ が .apm/instructions/ と乖離しています。ローカルで 'apm install' を実行し、生成物をコミットしてください。"
            git status -- .github/instructions/
            git diff -- .github/instructions/
            exit 1
          fi
          echo ".github/instructions/ は .apm/instructions/ と同期しています。"
