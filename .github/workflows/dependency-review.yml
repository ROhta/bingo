name: Dependency Check
on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested, ready_for_review]
    branches:
      - main
jobs:
  Dependency-Review:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - if: github.actor != 'dependabot[bot]'
        uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
  Build-Check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions: {}
    steps:
      - if: github.actor != 'dependabot[bot]'
        uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # node / pnpm のバージョンは mise.toml を SSoT とする。apm は CI で不要なので install 対象外。
      # mise 本体の版は pnpm の aqua アセット解決に影響する実績があるため version をピンする。
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.1
          install_args: "node pnpm"
      - name: Install Dependencies
        run: pnpm i --frozen-lockfile
      - name: Build
        run: pnpm run build
