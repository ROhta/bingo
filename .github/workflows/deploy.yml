name: Deploy pages

on:
  workflow_dispatch:
    inputs:
      confirm:
        required: true
        description: "本当に実行しますか？実行する場合「run」と書いてください。"
      environment:
        required: true
        description: "反映対象の環境"
        type: environment
  push:
    branches:
      - main

# デフォルトシェルでパイプエラーを有効化
defaults:
  run:
    shell: bash

# ワークフローが複数起動したら自動キャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - name: Confirm Check
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'run'
        run: echo "Invalid input" && exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run actionlint in workflow Directory
        run: |
          set -x
          docker run --rm -v "$(pwd):$(pwd)" -w "$(pwd)" rhysd/actionlint:1.7.4
      # node / pnpm のバージョンは mise.toml を SSoT とする。apm は CI で不要なので install 対象外。
      # mise 本体の版は pnpm の aqua アセット解決に影響する実績があるため version をピンする。
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.1
          install_args: "node pnpm"
      - name: Install Dependencies
        run: pnpm i --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Clean Up
        run: rm -r src/ts
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "src/"
  Deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - Build
    permissions:
      pages: write
      id-token: write
    timeout-minutes: 5
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
