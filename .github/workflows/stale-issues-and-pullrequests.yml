name: Close Inactive Issues and PullRequests
on:
  schedule:
    - cron: "0 0 1 * *"

# デフォルトシェルでパイプエラーを有効化
defaults:
  run:
    shell: bash

# ワークフローが複数起動したら自動キャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  close-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    timeout-minutes: 5
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "進捗無いからもう少ししたら閉じちゃうよ"
          close-issue-message: "閉じるよ"
          exempt-issue-labels: "bug-1 重大バグ"
          days-before-issue-stale: 180
          days-before-issue-close: 14
          stale-pr-message: "進捗無いからもう少ししたら閉じちゃうよ"
          close-pr-message: "閉じるよ"
          exempt-pr-labels: "bug-1 重大バグ"
          days-before-pr-stale: 180
          days-before-pr-close: 14
